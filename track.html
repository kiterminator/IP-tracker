<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You've received a link!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .container { text-align: center; padding: 40px 30px; max-width: 520px; }
    h1 { font-size: 2rem; margin-bottom: 12px; }
    p { font-size: 1.05rem; opacity: 0.9; line-height: 1.6; margin-bottom: 24px; }
    .loader {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 30px;
      margin-top: 20px;
    }
    .card h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .card p { font-size: 0.95rem; margin-bottom: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="loader"></div>
      <h1>⏳ Loading Content...</h1>
      <p>Please wait while we prepare everything for you.</p>
    </div>
    <div id="content" class="hidden">
      <h1>👋 Welcome!</h1>
      <div class="card">
        <h2>Thanks for visiting</h2>
        <p>The content you're looking for is being prepared. Please check back later!</p>
      </div>
    </div>
  </div>

  <!-- Scripts — note the ./ prefix -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/tracker.js"></script>
</body>
</html>
